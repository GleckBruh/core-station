- type: entity
  parent: EncryptionKey
  id: RDSEncryptionKeyGuards
  name: Ключ шифрования стражи
  description: особый ключик шифрования каналов стражи.
  components:
  - type: EncryptionKey
    channels:
    - RDSGuard
    defaultChannel: RDSGuard
  - type: Sprite
    layers:
    - state: crypt_gray
    - state: common_label

- type: entity
  parent: EncryptionKey
  id: RDSEncryptionKeySeparatist
  name: Ключ шифрования сепаратистов
  description: ключевая часть связи сепаратистов.
  components:
  - type: EncryptionKey
    channels:
    - RDSSeparatist
    defaultChannel: RDSSeparatist
  - type: Sprite
    layers:
    - state: crypt_gray
    - state: common_label

