# Бронежилет Тени РедШутера
- type: entity
  parent: ClothingOuterArmorBasic
  id: RDSClothingOuterVestGuardShadowMRKS
  name: Бронежилет Тени РедШутера
  description: Многослойная композитная броня, выкрашенная в глубокий черный цвет. Этот жилет не прячет вас от врага, он позволяет игнорировать его выстрелы.
  suffix: Стража
  components:
  - type: Sprite
    sprite: _RedShooter/Clothing/OuterClothing/Armor/guardian_mrks.rsi
    scale: 0.6, 0.6
  - type: Clothing
    sprite: _RedShooter/Clothing/OuterClothing/Armor/guardian_mrks.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.5
        Slash: 0.5
        Piercing: 0.5
        Heat: 0.7
  - type: ExplosionResistance
    damageCoefficient: 0.7

# Противоударная Броня
- type: entity
  parent: [ClothingOuterBaseLarge, AllowSuitStorageClothing, BaseSecurityContraband]
  id: RDSClothingOuterArmorGuardRiot
  name: Противоударная Броня Стражи
  description: Массивная и грубая броня, созданная для тех, кто стоит в первом ряду. Ей не страшны ни куски арматуры, ни тяжелые молоты.
  suffix: Стража
  components:
  - type: Sprite
    sprite: _RedShooter/Clothing/OuterClothing/Armor/guardian_riot.rsi
  - type: Clothing
    sprite: _RedShooter/Clothing/OuterClothing/Armor/guardian_riot.rsi
  - type: Armor
    coverage:
    - Chest
    - Groin
    - Arm
    - Leg
    - Tail
    traumaDeductions:
      Dismemberment: 0.4
      OrganDamage: 0.4
      BoneDamage: 0.4
      VeinsDamage: 0
      NerveDamage: 0
    modifiers:
      coefficients:
        Blunt: 0.35
        Slash: 0.35
        Piercing: 0.6
        Heat: 0.6
        Caustic: 0.75
  - type: ExplosionResistance
    damageCoefficient: 0.9
  - type: GroupExamine
  - type: StaminaResistance # Goobstation
    damageCoefficient: 0.6


- type: entity
  parent: [ClothingOuterBaseLarge, AllowSuitStorageClothing]
  id: RDSClothingOuterGuardArmorHeavy
  name: Тяжелая Штурмовая Броня
  description: Снаряжение для тех, кто заходит в помещение первым. Толстая сталь и керамика хранят на себе вмятины от пуль, которые стали бы фатальными для любого другого.
  suffix: Сепаратисты
  components:
  - type: Sprite
    sprite: _RedShooter/Clothing/OuterClothing/Armor/heavyassault_armor.rsi
  - type: Clothing
    sprite: _RedShooter/Clothing/OuterClothing/Armor/heavyassault_armor.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.2
        Slash: 0.2
        Piercing: 0.2
        Heat: 0.5
        Radiation: 0
        Caustic: 0.75
  - type: GroupExamine
  - type: StaminaResistance # Goobstation
    damageCoefficient: 0.6
