# Сфера Стражи (СТШ-81)
- type: entity
  parent: ClothingHeadBase
  id: RDSClothingHeadHelmetGuardSfera
  name: Сфера Стражи (СТШ-81)
  description: Глубокая модернизация советской классики. Три массивные титановые пластины в новом чехле обеспечивают отличную защиту головы от осколков и пистолетных пуль.
  suffix: Стража
  components:
  - type: Sprite
    sprite: _RedShooter/Clothing/Head/Helmets/guardian_sfera.rsi
    scale: 0.6, 0.6
  - type: Clothing
    sprite: _RedShooter/Clothing/Head/Helmets/guardian_sfera.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.85
        Slash: 0.9
        Piercing: 0.9
        Heat: 0.8
  - type: Tag
    tags:
    - WhitelistChameleon

