# Противоударный Шлем
- type: entity
  parent: [ClothingHeadHelmetBase, BaseSecurityContraband]
  id: RDSClothingHeadHelmetGuardRiot
  name: Противоударный Шлем Стражи
  description: Легкий и прочный шлем с прозрачным забралом. Разработан для защиты головы от ударов тяжелыми предметами и летящих камней.
  suffix: Стража
  components:
  - type: Sprite
    sprite: _RedShooter/Clothing/Head/Helmets/guardian_light_riot.rsi
  - type: Clothing
    sprite: _RedShooter/Clothing/Head/Helmets/guardian_light_riot.rsi
  - type: IngestionBlocker
  - type: FlashImmunity
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.95
  - type: HideLayerClothing
    layers:
      Hair: HEAD

