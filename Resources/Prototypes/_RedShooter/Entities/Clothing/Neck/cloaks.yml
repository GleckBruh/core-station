# Тень РедШутера
- type: entity
  parent: ClothingNeckBase
  id: RDSClothingNeckMRKS
  name: Тень РедШутера
  description: Потертая камера и выцветшие знаки отличия, за которыми стоит история сотен выполненных контрактов. Это снаряжение видело то, во что обычный солдат не захочет верить, и сохранило память о моментах, когда Тень решал исход битвы в одиночку.
  suffix: Стража
  components:
  - type: Sprite
    sprite: _RedShooter/Clothing/Neck/Misc/Pins/mrks.rsi

# Тень РедШутера
- type: entity
  parent: ClothingNeckBase
  id: RDSClothingNeckRDS
  name: Красный Стрелок
  description: Символы, вселяющие стальную уверенность в подчиненных. Красный цвет этих знаков — не просто дань имени, а напоминание о железной воле командира, который прошел путь от рядового стрелка до высшего офицерского чина.
  suffix: Стража
  components:
  - type: Sprite
    sprite: _RedShooter/Clothing/Neck/Misc/Pins/reds.rsi
