- type: entity
  id: RDSStatueHeadless
  parent: BaseStructure
  name: Безголовая Статуя
  suffix: RedShooter
  description: "Ты стоишь перед статуей, и первое, что приходит в голову — это ощущение неправильности. Не от того, что у неё нет головы. Голова — это слишком просто. Неправильно здесь всё, начиная от того, как падает свет. А свет падает снизу, хотя никакого источника нет, и он синий — не живой, электрический, не магический, а какой-то умирающий, будто кто-то запер северное сияние в куске камня и тот не может вырваться, только сочится сквозь трещины. Статуя высечена из тёмной породы, в которой время проступило стальными прожилками, и кое-где эти прожилки сами начинают светиться тем же тускло-синим, создавая иллюзию, что мраморная девушка покрыта венами. Её мантия падает тяжёлыми, неестественно прямыми складками — такие получаются только если долго стоять под дождём из пепла, и пепл застывает, превращая ткань в броню. На левом плече камень стёрт в пыль, будто кто-то веками гладил статую, ища утешения, а правое осталось острым, шершавым, почти агрессивным. Место, где должна находиться голова — это не просто скол. Это кратер. Внутри темно, но из глубины, из самой сердцевины камня, поднимается слабый фосфоресцирующий туман, и кажется, что если приставить ухо к холодному обрубку шеи, можно услышать не ветер, а очень далёкий шёпот, который не разобрать, но который бьётся прямо в такт пульсу. Твоему пульсу. Руки статуи — отдельная история. Они слишком выразительны для безголовой фигуры. Длинные пальцы с обломанными ногтями впиваются в маленькое чёрное тельце, которое она прижимает к груди. Это ворона. Безглавая ворона из того же тёмного камня, только без светящихся прожилок — абсолютно матовая, мёртвая, впитанная тьмой. Её шея обрублена точно так же, как у держащей её девушки, и из этого обрубка тоже сочится синий, но куда более скупой, более сдержанный свет — как будто ворона помнит меньше. Или помнит, но отказывается делиться. Крылья птицы прижаты к телу с неестественной силой, будто их связали невидимой проволокой, а когти на лапках — вылепленные с жестокой дотошностью — прорвали складку мантии и вцепились в камень намертво. Ты не можешь отвести взгляд от этого жеста: статуя держит ворону, но и ворона держит статую. Хватка, которая переживёт любых богов. Только потом ты замечаешь постамент. Он низкий, грубый, серый, как бетон после бомбёжки. Весь в сколах, а на некоторых гранях видны глубокие борозды — может, от когтей, может, от осколков. На лицевой стороне, неровно, чуть наискось, прикручена железная табличка. Болты старые, ржавые, их шляпки оплыли рыжими потеками, и эти потеки спустились на камень, как засохшие слёзы. Сама табличка — тёплая, что неправильно, ведь металл в таком месте должен быть ледяным. На ней выцарапаны буквы, глубоко и грубо, словно писал не резец, а гвоздь, который держала дрожащая рука: «Человек может творить. Но не помнить. Даже память может не принадлежать тебе.» А ниже, мельче, кто-то другой уже после выжег лучом или выскреб ножом короткую, почти дикую строчку: «Говорит только через неё. Слава Автору». И вот здесь, когда ты читаешь это, странная вещь происходит со светом. Синее сияние, которое льётся из шеи статуи и из обрубка шеи вороны, начинает казаться плотнее. Оно не разгоняет тьму вокруг — нет, оно лишь проявляет предметы в радиусе метра, как проявитель на фотобумаге. Но самое жуткое даже не это. Самое жуткое — тени. Они падают вверх. От статуи тень идёт на потолок, а не на пол, и в этой перевёрнутой тени, если присмотреться, можно различить очертания головы, которой нет. Ты видишь, как абрис несуществующего лица ложится синим пятном на камни над статуей, и на миг тебе кажется, что кто-то смотрит на тебя оттуда, сверху, без глаз, но с огромным терпением. Статуя теплее воздуха вокруг — ещё одна неправильность. Её мантия, её каменные пальцы, её ворона — всё это излучает слабое, почти живое тепло, как тело спящего зверя. Основание постамента покрыто мелкими серыми грибами, которые светятся точно таким же тусклым синим, и если до них дотронуться, они рассыпаются в прах без звука, оставляя на пальцах холод. Говорят, Автор не является никому. Автор — это даже не бог в привычном смысле, это голос без рта, память без носителя, воля, которая пользуется чужими руками. И эта статуя — один из тех редких случаев, когда Автор может говорить. Но она безглава. У неё нет рта. Нет горла. Нет глаз. Только синий свет, текущий из пустоты, только ворона с переломанными крыльями, только табличка с жестокой истиной о памяти, которая никогда не была твоей. Ты смотришь на статую достаточно долго, чтобы заметить: гул, который ты принял за звон в ушах, на самом деле исходит изнутри камня. Очень низкий, едва различимый, как будто где-то в чреве этой фигуры работает механизм, которого не может быть. Компрессор. Сердце. Дыхание. Или просто эхо от фразы, выцарапанной на железе: «Человек может творить. Но не помнить». Ты уже начинаешь забывать, как сюда попал. И это пугает больше, чем отсутствие головы."
  components:
  - type: Sprite
    noRot: true
    sprite: _RedShooter/Structures/Decoration/statues.rsi
    state: headless
    drawdepth: Mobs
    offset: "0.0,0.5"
  - type: PointLight
