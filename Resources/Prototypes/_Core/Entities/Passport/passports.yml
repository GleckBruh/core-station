- type: entity
  parent: BaseItem
  id: BasePassport
  abstract: true
  name: passport
  description: A passport denoting an individual's nationality and identity.
  components:
  - type: Passport
  - type: UseDelay
    delay: 0.5
  - type: Sprite
    sprite: _Core/Contractors/Passport.rsi
    layers:
    - state: passport_biesel_open
  - type: Appearance
    
- type: entity
  parent: BasePassport
  id: EuropeanPassport
  components:
  - type: Sprite
    sprite: _Core/Passport.rsi
    layers:
    - state: passport_solfed_open # todo: allow people to toggle open and closed
  - type: ExtendDescription
    descriptionList:
    - description: passport-european
      fontSize: 12
      color: "#77ff77"
      requireDetailRange: true
      requirements:
      - !type:NationalityRequirement
        nationalities:
        - European
